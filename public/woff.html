<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>LINE WORKS 日程調整 MVP</title>
    <link rel="stylesheet" href="/woff.css?v=20260320b" />
  </head>
  <body>
    <div id="authModal" class="modal hidden" role="dialog" aria-modal="true" aria-labelledby="authModalTitle">
      <div class="modal-card">
        <h2 id="authModalTitle">初回ログインが必要です</h2>
        <p>予定登録を行うには、最初にLINE WORKSアカウントでログインしてください。</p>
        <div class="inline">
          <button id="modalLoginBtn" type="button">LINE WORKSでログイン</button>
          <button id="modalCloseBtn" type="button" class="secondary">あとで</button>
        </div>
      </div>
    </div>
    <div
      id="successModal"
      class="modal hidden"
      role="dialog"
      aria-modal="true"
      aria-labelledby="successModalTitle"
    >
      <div class="modal-card">
        <h2 id="successModalTitle">予定登録が完了しました</h2>
        <p id="successMessage"></p>
        <div class="inline">
          <button id="successCloseBtn" type="button">閉じる</button>
        </div>
      </div>
    </div>

    <main class="app">
      <header class="hero">
        <p class="eyebrow">LINE WORKS Schedule</p>
        <h1>日程候補表示・予定登録</h1>
        <p class="sub">候補検索から登録までを、この画面で完了できます。</p>
      </header>

      <section class="card">
        <h2>画面1: 候補検索</h2>
        <div class="grid">
          <label>
            所要時間
            <select id="durationMinutes">
              <option value="30" selected>30分</option>
              <option value="60">60分</option>
            </select>
          </label>
          <label>
            土日除外
            <select id="excludeWeekends">
              <option value="true" selected>除外する</option>
              <option value="false">除外しない</option>
            </select>
          </label>
        </div>

        <label>
          参加メンバー（検索して追加）
          <input id="memberSearch" type="text" placeholder="名前で検索" autocomplete="off" />
        </label>
        <div id="memberOptions" class="member-options"></div>
        <div id="selectedMembers" class="chips"></div>

        <div class="grid">
          <label>
            期間開始
            <input id="rangeFrom" type="datetime-local" />
          </label>
          <label>
            期間終了
            <input id="rangeTo" type="datetime-local" />
          </label>
        </div>

        <div class="inline">
          <button id="searchBtn" type="button">候補を検索</button>
        </div>
      </section>

      <section class="card">
        <h2>画面2: 候補結果</h2>
        <p id="authStatus" class="status"></p>
        <div class="inline">
          <button id="loginBtn" type="button">LINE WORKSでログイン</button>
        </div>
        <p id="searchSummary" class="status"></p>
        <div id="candidates" class="list"></div>
      </section>

      <section class="card">
        <h2>画面3: 登録確認</h2>
        <div class="grid">
          <label>
            件名
            <input id="eventTitle" type="text" value="打ち合わせ" />
          </label>
          <label>
            登録先
            <input type="text" value="自分のカレンダー（me固定）" disabled />
          </label>
        </div>
        <p id="confirmSlot" class="status">候補を選択するとここに表示されます。</p>
        <div class="inline">
          <button id="createBtn" type="button" disabled>この内容で登録</button>
        </div>
      </section>

      <section class="card">
        <h2>実行ログ</h2>
        <pre id="log"></pre>
      </section>
    </main>

    <script src="/woff.js?v=20260320b" type="module"></script>
  </body>
</html>
