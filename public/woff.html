<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>LINE WORKS 日程調整 MVP</title>
    <link rel="stylesheet" href="/woff.css" />
  </head>
  <body>
    <main class="app">
      <header class="hero">
        <p class="eyebrow">LINE WORKS Schedule</p>
        <h1>日程候補表示・予定登録</h1>
        <p class="sub">候補検索から登録までを、この画面で完了できます。</p>
      </header>

      <section class="card">
        <h2>画面1: 候補検索</h2>
        <div class="grid">
          <label>
            実行ユーザー
            <input id="actorUserId" type="text" value="me" />
          </label>
          <label>
            所要時間
            <select id="durationMinutes">
              <option value="30" selected>30分</option>
              <option value="60">60分</option>
            </select>
          </label>
        </div>

        <label>
          参加メンバー（改行区切り）
          <textarea id="participants" rows="4">taniguchi.kyoshiro@hrdcorporation
hr.01106@hrdcorporation</textarea>
        </label>

        <div class="grid">
          <label>
            期間開始
            <input id="rangeFrom" type="datetime-local" />
          </label>
          <label>
            期間終了
            <input id="rangeTo" type="datetime-local" />
          </label>
        </div>

        <div class="inline">
          <label><input id="excludeWeekends" type="checkbox" checked /> 土日除外</label>
          <button id="searchBtn">候補を検索</button>
        </div>
      </section>

      <section class="card">
        <h2>画面2: 候補結果</h2>
        <p id="authStatus" class="status"></p>
        <p id="searchSummary" class="status"></p>
        <div id="candidates" class="list"></div>
      </section>

      <section class="card">
        <h2>画面3: 登録確認</h2>
        <div class="grid">
          <label>
            件名
            <input id="eventTitle" type="text" value="打ち合わせ" />
          </label>
          <label>
            登録カレンダーID
            <input id="calendarId" type="text" value="me" />
          </label>
        </div>
        <p id="confirmSlot" class="status">候補を選択するとここに表示されます。</p>
        <div class="inline">
          <button id="createBtn" disabled>この内容で登録</button>
        </div>
      </section>

      <section class="card">
        <h2>実行ログ</h2>
        <pre id="log"></pre>
      </section>
    </main>

    <script src="/woff.js" type="module"></script>
  </body>
</html>
